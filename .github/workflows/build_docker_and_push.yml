
name: Build and Push to Docker Hub

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --build-arg AZURE_ENDPOINT="${{ secrets.AZURE_ENDPOINT }}" \
            --build-arg AZURE_API_KEY="${{ secrets.AZURE_API_KEY }}" \
            --build-arg AZURE_API_VERSION="${{ secrets.AZURE_API_VERSION }}" \
            -t qunikamshreyas/69712afaaf3b3d8cb59d84c2_streamlit_app:latest .

      - name: Push Docker image
        run: |
          docker push qunikamshreyas/69712afaaf3b3d8cb59d84c2_streamlit_app:latest
